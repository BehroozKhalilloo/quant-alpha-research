data:
  provider: yfinance
  raw_dir: data/raw
  processed_dir: data/processed
  market_data_file: data/raw/ohlcv.csv
  benchmark: SPY
  start_date: "2018-01-01"
  end_date:
  tickers:
    - AAPL
    - MSFT
    - NVDA
    - AMZN
    - META
    - GOOGL
    - GOOG
    - BRK-B
    - AVGO
    - JPM
    - LLY
    - V
    - XOM
    - UNH
    - MA
    - COST
    - PG
    - HD
    - NFLX
    - JNJ
    - BAC
    - ABBV
    - CRM
    - KO
    - MRK
    - CVX
    - WMT
    - AMD
    - PEP
    - ORCL
    - TMO
    - LIN
    - MCD
    - CSCO
