features:
  beta_window: 60
  vol_window: 21
  liquidity_window: 60
  volume_window: 20

signal:
  liquidity_threshold: 0.40
  winsor_lower: 0.01
  winsor_upper: 0.99
  shift_days: 1

validation:
  forward_horizon: 1
  quantiles: 10

portfolio:
  weighting: equal
  max_weight: 0.10

backtest:
  holding_period: 1
  transaction_cost_bps: 5.0

report:
  output_file: reports/generated_report.md
  figures_dir: reports/figures

logging:
  level: INFO

