    - ISRG
    - NKE
    - SPY

features:
  beta_window: 60
  vol_window: 21
  liquidity_window: 60
  volume_window: 20

signal:
  mode: blend
  sleeves:
    reversal_5d: 0.80
    residual_reversal_1d: 0.10
    momentum_21d: 0.05
    quality_proxy: 0.05
  base_feature: return_5d
  direction: reversal
  vol_adjust: false
  liquidity_threshold: 0.00
  winsor_lower: 0.01
  winsor_upper: 0.99
  shift_days: 1

validation:
  forward_horizon: 5
  quantiles: 10

portfolio:
  weighting: equal
  max_weight: 0.125

backtest:
  holding_period: 5
  transaction_cost_bps: 5.0

capacity:
  aum_levels:
    - 1000000
    - 10000000
    - 50000000
    - 100000000
  impact_coefficient: 0.10

robustness:
  split_date: "2022-01-01"

report:
  output_file: reports/generated_report.md
  figures_dir: reports/figures

logging:
  level: INFO
